[build]
  command = "bash scripts/netlify-build.sh"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Bundle standalone Python only for the SmartPy API; avoids copying it into every function.
[functions.api]
  included_files = ["vendor/kiln-python/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
